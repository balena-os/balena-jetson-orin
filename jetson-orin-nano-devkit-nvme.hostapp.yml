# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
version: '2.4'
services:

  # Opt out of the kernel-modules build leg. The meta-balena fragment
  # declares `kernel-modules` with an empty `x-build: {}` which expects
  # the device repo to provide a recipe (RPi has a meta-kernel-block
  # layer with `balena-kernel-block`). The Jetson device repo has no
  # equivalent layer yet, so the matrix entry resolves to an empty
  # recipe name and the artifact path comes out as
  # `-jetson-orin-nano-devkit-nvme.docker` (leading dash, no file).
  # `x-build: ~` is the documented opt-out signal — the workflow
  # strips services where x-build is null (yocto-build-deploy.yml L418).
  kernel-modules:
    x-build: ~

  # nvidia-container service disabled until the Scarthgap layout fix
  # lands in layers/meta-nvidia-container-block (conf/samples ->
  # conf/templates/<name>). See plan §B.1.
  #
  # nvidia-container:
  #   image: __BUILD_OUTPUT__
  #   x-build:
  #     recipe: balena-nvidia-container-block
  #     build_args:
  #       - "-t"
  #       - "layers/meta-nvidia-container-block/conf/samples"
  #     profiles:
  #       - nvidia-gpu
  #   labels:
  #     io.balena.image.class: 'overlay'
  #     io.balena.image.store: 'data'
