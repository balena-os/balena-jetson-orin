# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
version: '2.4'
services:

  nvidia-container:
    image: __BUILD_OUTPUT__
    x-build:
      recipe: balena-nvidia-container-block
      build_args:
        - "-t"
        - "layers/meta-nvidia-container-block/conf/samples"
      profiles:
        - nvidia-gpu
    labels:
      io.balena.image.class: 'overlay'
      io.balena.image.store: 'data'
      io.balena.update.requires-reboot: '1'
      io.balena.image.override: '200'
