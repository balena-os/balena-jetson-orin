# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
version: '2.4'
services:

  # Opt out of the kernel-modules build leg (no Jetson-side equivalent
  # of RPi's meta-kernel-block layer yet; meta-balena's kernel-modules
  # fragment has an empty x-build that resolves to an empty recipe).
  # `x-build: ~` is the documented opt-out signal — workflow strips
  # services where x-build is null before parsing the matrix.
  kernel-modules:
    x-build: ~

  nvidia-container:
    # Opt out for the intermediate release. master hup-2.x.sh has issues
    # with multi-service releases (picks contains__image[0] blindly);
    # this rev exists to bridge the cloud's downgrade-check from a fresh
    # 7.0.3+rev1 device to a real target, so a subsequent PATCH to the
    # with-ext release succeeds. Restore in the follow-up commit.
    x-build: ~
