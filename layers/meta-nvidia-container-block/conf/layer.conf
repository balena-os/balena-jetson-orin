BBPATH .= ":${LAYERDIR}"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb ${LAYERDIR}/recipes-*/*/*.bbappend"
BBFILE_COLLECTIONS += "meta-nvidia-container-block"
BBFILE_PATTERN_meta-nvidia-container-block = "^${LAYERDIR}/"
LAYERSERIES_COMPAT_meta-nvidia-container-block = "scarthgap"

# Enable DISTRO_FEATUREs gated by meta-tegra recipes we depend on.
#  - virtualization: nvidia-container-toolkit (CDI hook subpackage)
#  - opengl: tegra-libraries-camera + multimedia* + omx (referenced by
#    drivers.csv for V4L2 / camera / video pipelines)
# x11 stays disabled (balena is headless) — tegra-libraries-glxcore is
# excluded from IMAGE_INSTALL since GLX is X11-only.
# vulkan stays disabled — tegra-libraries-vulkan is excluded; not needed
# for the CUDA-runtime PoC.
DISTRO_FEATURES:append = " virtualization opengl"

# Pull in meta-tegra's external nvidia-container-toolkit recipe only.
# A wider glob also picks up docker/docker-moby_%.bbappend which depends
# on meta-virtualization being present (it isn't).
BBFILES += "${LAYERDIR}/../meta-tegra/external/virtualization-layer/recipes-containers/nvidia-container-toolkit/nvidia-container-toolkit_*.bb"
