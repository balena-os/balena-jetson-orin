# Drop-in added by balena-nvidia-cdi-setup: ensure the engine starts after
# the CDI spec generation oneshot. /etc/systemd/system/balena.service.wants/
# is not writable on balenaOS, so we wire the dependency via a drop-in in
# the extension's overlay instead of the [Install] WantedBy mechanism.
[Unit]
Wants=balena-nvidia-cdi-setup.service
After=balena-nvidia-cdi-setup.service
