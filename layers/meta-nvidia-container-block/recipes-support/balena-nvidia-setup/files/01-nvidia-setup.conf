# Drop-in added by balena-nvidia-setup: ensure the engine starts after the
# NVIDIA boot-time setup oneshot (CDI spec + daemon.json runtime registration). /etc/systemd/system/balena.service.wants/
# is not writable on balenaOS, so we wire the dependency via a drop-in in
# the extension's overlay instead of the [Install] WantedBy mechanism.
[Unit]
Wants=balena-nvidia-setup.service
After=balena-nvidia-setup.service
