BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "balena-jetson"
BBFILE_PATTERN_balena-jetson := "^${LAYERDIR}/"
BBFILE_PRIORITY_balena-jetson = "1337"

# kernel-image is installed by meta-tegra-nonpublic. We use kernel-image-initramfs
# Remove kernel-image package
MACHINE_ESSENTIAL_EXTRA_RDEPENDS:remove = "kernel-image"
MACHINE_ESSENTIAL_EXTRA_RRECOMMENDS += "tegra-nvpmodel tegra-configs-udev"

BBMASK += "/meta-tegra-nonpublic/recipes-core/ "
BBMASK += "/meta-tegra-nonpublic/recipes-graphics/cairo "
BBMASK += "/meta-tegra-nonpublic/recipes-graphics/clutter "
BBMASK += "/meta-tegra-nonpublic/recipes-graphics/cogl "
BBMASK += "/meta-tegra-nonpublic/recipes-graphics/drm "
BBMASK += "/meta-tegra-nonpublic/recipes-graphics/mesa "
BBMASK += "/meta-tegra-nonpublic/recipes-graphics/vulkan "
BBMASK += "/meta-tegra-nonpublic/recipes-graphics/wayland "
BBMASK += "/meta-tegra-nonpublic/recipes-graphics/xorg-xserver "
BBMASK += "/meta-tegra-nonpublic/external/openembedded-layer/recipes-support/opencv/ "
BBMASK += "/meta-tegra-nonpublic/recipes-multimedia/gstreamer/"
BBMASK += "/meta-tegra-nonpublic/recipes-bsp/l4t-usb-device-mode/"
BBMASK += "/meta-tegra-nonpublic/recipes-graphics/xwayland"
BBMASK += "/meta-tegra-nonpublic/recipes-bsp/tools/tegra-boot-tools_git.bb"
BBMASK += "/meta-tegra-nonpublic/recipes-core/images/tegra-minimal-initramfs.bb"
BBMASK += "/meta-tegra-nonpublic/external/openembedded-layer/recipes-graphics/libglvnd/"
BBMASK += "/meta-tegra-nonpublic/recipes-support/sbsigntool/"
BBMASK += "/meta-tegra-nonpublic/recipes-devtools/cuda/"
BBMASK += "/meta-tegra-nonpublic/external/openembedded-layer/recipes-bsp/l4t-usb-device-mode/l4t-usb-device-mode.bbappend"

LAYERSERIES_COMPAT_balena-jetson = "wrynose"
LAYERSERIES_COMPAT_tegra = "wrynose"

SERIAL_CONSOLES = "115200;ttyTCU0"
KERNEL_IMAGETYPES = "Image"
KERNEL_IMAGETYPE = "Image"
PARTITION_TABLE_TYPE = "gpt"

MACHINE_ESSENTIAL_EXTRA_RDEPENDS:remove = "tegra-firmware"
